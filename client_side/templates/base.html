<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Customer Support Email Agent{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script>
      // Tailwind config for dark theme
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#4F46E5',  // Indigo
              secondary: '#22D3EE', // Cyan
              accent: '#F472B6',    // Pink
            },
          },
        },
      }
    </script>
  </head>
  <body class="bg-gray-900 text-gray-200 dark">
    <!-- Navigation -->
    <nav class="bg-gray-800 shadow-lg">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16 items-center">
          <div class="flex items-center">
            <h1 class="text-2xl font-bold text-primary">Email Agent</h1>
          </div>
          <div class="flex items-center space-x-6">
            <a
              href="/"
              class="hover:text-primary px-3 py-2 rounded-md text-sm font-medium transition-colors"
              >Test Email</a
            >
            <a
              href="/ui/inbox"
              class="hover:text-primary px-3 py-2 rounded-md text-sm font-medium transition-colors"
              >Inbox</a
            >
            <a
              href="/ui/followups"
              class="hover:text-primary px-3 py-2 rounded-md text-sm font-medium transition-colors"
              >FollowUps</a
            >
            <a
              href="/docs"
              class="hover:text-primary px-3 py-2 rounded-md text-sm font-medium transition-colors"
              target="_blank"
              >API Docs</a
            >
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto py-12 px-4 sm:px-6 lg:px-8">
      {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 mt-12">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 border-t border-gray-700">
        <p class="text-center text-gray-400 text-sm">
          Customer Support Email Agent v0.1.0
        </p>
      </div>
    </footer>

    <script>
      // Utility: Format datetime
      function formatDate(dateStr) {
        if (!dateStr) return "N/A";
        const date = new Date(dateStr);
        return date.toLocaleString();
      }

      // Utility: Format percentage
      function formatPercent(value) {
        if (value === null || value === undefined) return "N/A";
        return (value * 100).toFixed(1) + "%";
      }

      // Utility: Get status badge color
      function getStatusColor(status) {
        const colors = {
          pending: "bg-yellow-800 text-yellow-300",
          processing: "bg-blue-800 text-blue-300",
          responded: "bg-green-800 text-green-300",
          failed: "bg-red-800 text-red-300",
          archived: "bg-gray-700 text-gray-300",
        };
        return colors[status] || "bg-gray-700 text-gray-300";
      }

      // Utility: Get priority badge color
      function getPriorityColor(priority) {
        const colors = {
          low: "bg-green-800 text-green-300",
          medium: "bg-yellow-800 text-yellow-300",
          high: "bg-orange-800 text-orange-300",
          urgent: "bg-red-800 text-red-300",
        };
        return colors[priority] || "bg-gray-700 text-gray-300";
      }

    </script>

    {% block scripts %}{% endblock %}
  </body>
</html>
